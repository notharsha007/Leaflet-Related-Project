<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi Marker Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="map-container">
        <div id="map"></div>
    </div>

    <div id="controls">
        <button id="clear-markers-btn">Clear All Markers</button>
        <button id="group-markers-btn">Group Markers</button>

        <div id="group-summary" class="group-summary">
            Add markers on the map, then click Group Markers.
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
